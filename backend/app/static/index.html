    function useWaitTimer(admissionTimeStr, fallbackHrs = 0) {
      const getElapsed = useCallback(() => {
        if (!admissionTimeStr) return fallbackHrs * 3600;
        const diff = Date.now() - new Date(admissionTimeStr).getTime();
        return Math.max(0, Math.floor(diff / 1000));
      }, [admissionTimeStr, fallbackHrs]);

      const [seconds, setSeconds] = useState(getElapsed);

      useEffect(() => {
        setSeconds(getElapsed());
        const interval = setInterval(() => {
          setSeconds(getElapsed());
        }, 1000);
        return () => clearInterval(interval);
      }, [getElapsed]);

      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      
      if (h > 0) {
        return `${h}h ${m}m ${s}s`;
      }
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function OTTimer({ startTime }) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        setElapsed(Math.floor((Date.now() - startTime) / 1000));
        const interval = setInterval(() => {
          setElapsed(Math.floor((Date.now() - startTime) / 1000));
        }, 1000);
        return () => clearInterval(interval);
      }, [startTime]);

      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      return (
        <span className="mono">
          {h.toString().padStart(2, '0')}:{m.toString().padStart(2, '0')}:{s.toString().padStart(2, '0')}
        </span>
      );
    }

                <div style={{position: 'relative'}}>
                  <div style={{cursor: 'pointer', display: 'flex', alignItems: 'center'}} onClick={() => setNotificationsOpen(!notificationsOpen)}>

    // --- SUB-COMPONENTS ---

    // 1. OVERVIEW TAB
    const OverviewTab = ({ onBedClick, setTab, patients, beds, ventilators, auditEntries }) => {
      const icuOcc = beds.filter(b=>b.zone==='ICU' && b.status!=='AVAILABLE').length;
      const otOcc = beds.filter(b=>b.zone==='OT' && b.status!=='AVAILABLE').length;
      const emergencyBayOcc = beds.filter(b=>b.zone==='EM' && b.status!=='AVAILABLE').length;

      return (
        <div className="flex-col gap-6">
          <div className="flex gap-4">
            {[
              { title: 'ICU BEDS', num: `${icuOcc}/8`, sub: 'beds occupied', b1: `${8-icuOcc} beds available`, b2: 'Active care zone', fill: (icuOcc/8)*100, color: COLORS.critical, badge: 'CRITICAL', badgeC: COLORS.critBg, badgeB: COLORS.critBorder, badgeT: COLORS.critical },
              { title: 'THEATRES', num: `${otOcc}/4`, sub: 'in use', b1: 'Realtime operations', b2: 'Emergency surgical', fill: (otOcc/4)*100, color: COLORS.warning, badge: 'IN USE', badgeC: COLORS.warnBg, badgeB: COLORS.warnBorder, badgeT: COLORS.warning },
              { title: 'VENTILATORS', num: '3/10', sub: 'in use', b1: '7 available in storage', b2: 'All operational', fill: 30, color: COLORS.available, badge: 'STABLE', badgeC: COLORS.availBg, badgeB: COLORS.availBorder, badgeT: COLORS.available },
              { title: 'ACTIVE EMERGENCIES', num: `${emergencyBayOcc}`, sub: 'EM bay cases', b1: 'Live floor metrics', b2: 'Requires triage', fill: (emergencyBayOcc/4)*100, color: COLORS.critical, badge: 'URGENT', badgeC: COLORS.critBg, badgeB: COLORS.critBorder, badgeT: COLORS.critical, pulse: true }
            ].map((c, i) => (
              <div key={i} className="card-shadow flex-col flex-1" style={{background: '#FFF', borderRadius: 12, padding: 24, border: '1px solid #E2E8F0', animation: `card-enter 280ms ease-out forwards`, animationDelay: `${i*70}ms`, opacity: 0}}>
                <div className="flex justify-between items-center mb-4">
                  <span style={{fontFamily: 'Inter', fontWeight: 500, fontSize: 12, color: COLORS.secondary}}>{c.title}</span>
                  <span style={{background: c.badgeC, border: `1px solid ${c.badgeB}`, color: c.badgeT, fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 4}} className={c.pulse ? 'pulse-critical' : ''}>{c.badge}</span>
                </div>
                <div className="flex items-end gap-2 mb-4">
                  <span className="mono" style={{fontSize: 42, fontWeight: 500, color: c.color, lineHeight: 1}}>{c.num}</span>
                  <span style={{fontSize: 14, color: COLORS.secondary, marginBottom: 6}}>{c.sub}</span>
                </div>
                <div style={{width: '100%', height: 6, background: '#F1F5F9', borderRadius: 3, overflow: 'hidden', marginBottom: 16}}>
                  <div style={{width: `${c.fill}%`, height: '100%', background: c.color, transition: 'width 1s ease-out'}}></div>
                </div>
                <div style={{fontSize: 12, color: COLORS.muted}}>{c.b1} · {c.b2}</div>
              </div>
            ))}
          </div>

          <div className="flex gap-6" style={{marginTop: 24}}>
            <div className="card-shadow flex-col" style={{flex: 2, background: '#FFF', borderRadius: 12, padding: 24, border: '1px solid #E2E8F0'}}>
              <div style={{fontWeight: 600, fontSize: 14, color: COLORS.primary}}>Live Hospital Floor Map</div>
              <div style={{fontSize: 12, color: COLORS.secondary, marginBottom: 20}}>Real-time bed status — click any bed for full details</div>
              
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16}}>
                <WardZone title="ICU WING (8 BEDS)" beds={beds.filter(b=>b.zone==='ICU')} onClick={onBedClick} patients={patients} />
                <div className="flex-col gap-4">
                  <WardZone title="EMERGENCY BAY" beds={beds.filter(b=>b.zone==='EM')} onClick={onBedClick} patients={patients} />
                  <WardZone title="OPERATING THEATRES" beds={beds.filter(b=>b.zone==='OT')} onClick={onBedClick} isOT patients={patients} />
                </div>
                <WardZone title="GENERAL WARD A" beds={beds.filter(b=>b.zone==='GA')} onClick={onBedClick} patients={patients} />
                <WardZone title="GENERAL WARD B" beds={beds.filter(b=>b.zone==='GB')} onClick={onBedClick} patients={patients} />
              </div>
            </div>

            <div className="card-shadow flex-col" style={{flex: 1, background: '#FFF', borderRadius: 12, padding: 24, border: '1px solid #E2E8F0'}}>
              <div className="flex justify-between items-center mb-5">
                <div style={{fontWeight: 600, fontSize: 14, color: COLORS.primary}}>Recent Agent Operations</div>
                <div style={{fontSize: 12, color: COLORS.transfer, cursor: 'pointer'}} onClick={() => setTab('TAB_F')}>View All →</div>
              </div>
              <div className="flex-col gap-4">
                {auditEntries.slice(0,5).map((e, i) => (
                  <div key={i} className="flex gap-3">
                    <div className="flex items-center justify-center" style={{width: 36, height: 36, borderRadius: '50%', background: `${e.color}15`, color: e.color, fontWeight: 600, fontSize: 12, border: `1.5px solid ${e.color}`}}>{e.agent[0]}</div>
                    <div className="flex-col">
                      <div style={{fontWeight: 500, fontSize: 13, color: COLORS.primary}}>{e.text}</div>
                      <div style={{fontSize: 11, color: COLORS.secondary, marginTop: 4}}>{e.agent} · Match Confidence: {e.conf} · {e.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

      );

    const WardZone = ({ title, beds, isOT, onClick, patients }) => (
      <div style={{background: '#FAFBFC', border: '1px solid #E2E8F0', borderRadius: 10, padding: 14}}>
        <div style={{fontSize: 10, fontWeight: 600, color: COLORS.secondary, letterSpacing: '0.08em', marginBottom: 12}}>{title}</div>
        <div style={{display: 'flex', flexWrap: 'wrap', gap: 8}}>
          {beds.map(b => <BedCell key={b.id} bed={b} isOT={isOT} onClick={onClick} patients={patients} />)}
        </div>
      </div>
    );

    const BedCell = ({ bed, isOT, onClick, patients }) => {
      const [hover, setHover] = useState(false);
      const p = bed.patientId ? patients.find(pt => pt.id === bed.patientId) : null;
      
      let bg, border, iconColor;
      if (bed.status === 'AVAILABLE') { bg = COLORS.availBg; border = COLORS.availBorder; iconColor = COLORS.available; }
      else if (bed.status === 'CRITICAL') { bg = COLORS.critBg; border = COLORS.critBorder; iconColor = COLORS.critical; }
      else if (bed.status === 'STABLE') { bg = COLORS.warnBg; border = COLORS.warnBorder; iconColor = COLORS.warning; }
      else if (bed.status === 'TRANSFERRING') { bg = COLORS.transBg; border = COLORS.transBorder; iconColor = COLORS.transfer; }

      return (
        <div className="relative" onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={() => p && onClick(p)}>
          <div className={`flex items-center justify-center ${bed.status==='CRITICAL' ? 'pulse-critical' : ''}`} style={{width: 52, height: 52, background: bg, border: `1.5px solid ${border}`, borderRadius: 10, cursor: p ? 'pointer' : 'default', transition: '200ms', transform: hover && p ? 'scale(1.06)' : 'scale(1)'}}>
            <div className="mono" style={{position: 'absolute', top: 4, left: 4, fontSize: 10, color: iconColor}}>{bed.id.split('-')[1]}</div>
            {isOT ? <Icons.Grid color={iconColor} /> : <Icons.Bed color={iconColor} />}
            {bed.status === 'TRANSFERRING' && <div style={{position: 'absolute'}}><Icons.ArrowRight color={iconColor} /></div>}
          </div>
          {hover && p && (
            <div className="tooltip-shadow text-white" style={{position: 'absolute', bottom: '100%', left: '50%', transform: 'translateX(-50%)', marginBottom: 12, background: COLORS.sidebar, borderRadius: 10, padding: '14px 16px', width: 220, zIndex: 100, animation: 'modal-enter 150ms ease-out'}}>
              <div style={{position: 'absolute', bottom: -4, left: '50%', transform: 'translateX(-50%) rotate(45deg)', width: 8, height: 8, background: COLORS.sidebar}}></div>
              <div className="flex justify-between items-center mb-2">
                <span className="mono" style={{fontSize: 11, color: COLORS.teal}}>BED {bed.id}</span>
                <span style={{background: bed.status==='CRITICAL' ? COLORS.critical : COLORS.warning, color: '#FFF', fontSize: 9, padding: '2px 6px', borderRadius: 4}}>{bed.status}</span>
              </div>
              <div style={{height: 1, background: 'rgba(255,255,255,0.08)', margin: '8px 0'}}></div>
              <div className="flex justify-between items-center">
                <span className="mono" style={{fontSize: 13, color: '#FFF'}}>{p.id}</span>
                <span style={{fontSize: 11, color: COLORS.muted}}>{p.admittedAt}h ago</span>
              </div>
              <div style={{fontSize: 13, color: '#FFF', marginTop: 4, fontWeight: 500}}>{p.diagnosis}</div>
            </div>
          )}
        </div>
      );
    };

    // 2. WARD & ICU BEDS TAB
    const WardBedsTab = ({ onPatientClick, patients, beds, triggerSave, ventilators }) => {
      const [filterZone, setFilterZone] = useState('All Wards');
      const [assigningBed, setAssigningBed] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [overrideModalOpen, setOverrideModalOpen] = useState(false);
      const [overrideData, setOverrideData] = useState(null);
      const [vipPatientId, setVipPatientId] = useState('');
      const [approving, setApproving] = useState(false);

      const icuBeds = beds.filter(b => b.zone === 'ICU');
      const icuFull = icuBeds.length > 0 && icuBeds.filter(b => b.patientId !== null).length >= icuBeds.length;

      const handleScanOverrideCandidates = async () => {
        try {
          const res = await api.request('/api/nexus/vip-override/candidates');
          setOverrideData(res);
          const pendingVIPs = patients.filter(p => p.status === 'CRITICAL' && (!p.bedId || p.bedId.startsWith('EM')));
          if (pendingVIPs.length > 0) {
            setVipPatientId(pendingVIPs[0].id);
          }
          setOverrideModalOpen(true);
        } catch (e) {
          alert('Failed to scan candidates: ' + e.message);
        }
      };

      const handleApproveOverride = async (candidateId, targetBedId, destinationBedId) => {
        if (!vipPatientId) {
          alert('Please select a VIP patient requiring ICU admission.');
          return;
        }
        setApproving(true);
        try {
          await api.request('/api/nexus/vip-override/approve', {
            method: 'POST',
            body: JSON.stringify({
              vip_patient_id: vipPatientId,
              stable_patient_id: candidateId,
              target_icu_bed_id: targetBedId,
              relocation_bed_id: destinationBedId
            })
          });
          setOverrideModalOpen(false);
          await triggerSave(null, null, null, `Approved VIP ICU Override. Transferred stable patient ${candidateId} to ward bed ${destinationBedId} to admit VIP patient ${vipPatientId} to bed ${targetBedId}.`);
        } catch (e) {
          alert('Failed to approve override: ' + e.message);
        } finally {
          setApproving(false);
        }
      };

      const filteredBeds = useMemo(() => {
        if (filterZone === 'All Wards') return beds;
        const zoneMap = {'ICU Wing':'ICU', 'Emergency Bay':'EM', 'General Ward A':'GA', 'General Ward B':'GB', 'Operating Theatres':'OT'};
        return beds.filter(b => b.zone === zoneMap[filterZone]);
      }, [beds, filterZone]);

      const unassignedPatients = useMemo(() => {
        return patients.filter(p => !p.bedId || beds.find(b => b.id === p.bedId)?.status === 'AVAILABLE');
      }, [patients, beds]);

      const filteredPatients = useMemo(() => {
        return unassignedPatients.filter(p => 
          p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
          p.id.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [unassignedPatients, searchQuery]);

      const handleAssignPatient = async (patientId) => {
        if (!assigningBed) return;
        const patient = patients.find(p => p.id === patientId);
        if (!patient) return;
        try {
          await api.request('/api/nexus/beds/assign', {
            method: 'POST',
            body: JSON.stringify({ bed_id: assigningBed.id, patient_id: patientId })
          });
          await triggerSave(null, null, null, `Manual Allocation: Assigned ${patient.name} (${patient.id}) to Bed ${assigningBed.id}`);

            </div>

          {overrideModalOpen && overrideData && (
            <div className="flex items-center justify-center w-full h-full" style={{position: 'fixed', top: 0, left: 0, zIndex: 1000, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
              <div className="flex-col card-shadow text-black" style={{background: '#FFF', borderRadius: 16, width: '95vw', maxWidth: 650, padding: 32, display: 'flex', flexDirection: 'column', maxHeight: '85vh', overflowY: 'auto'}}>
                <div className="flex justify-between items-center mb-4">
                  <span style={{fontWeight: 700, fontSize: 18}}>ICU VIP Override Transfer Candidates</span>

                    <option value="">-- Select Patient --</option>

                        </div>

          <div className="flex justify-between items-center">

          <div className="flex gap-2" style={{margin: '16px 0'}}>

                  {doc && (
                    <div style={{marginTop: 10}}>
                      <div className="flex items-center gap-2">
                        <div className="flex items-center justify-center" style={{width: 24, height: 24, borderRadius: '50%', background: COLORS.transBg, color: COLORS.transfer, fontSize: 11, fontWeight: 600}}>{doc.initial}</div>
                        <div className="flex-col">
                          <span style={{fontWeight: 500, fontSize: 12, color: COLORS.primary}}>Dr. {doc.name}</span>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-2 mt-4" style={{marginTop: 'auto'}}>
                    <button onClick={() => onPatientClick(p)} style={{flex: 1, height: 32, background: COLORS.primary, color: '#FFF', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 500}}>View Report →</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Assign Patient Modal */}
          {assigningBed && (
            <div className="flex items-center justify-center w-full h-full" style={{position: 'fixed', top: 0, left: 0, zIndex: 1000, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
              <div className="flex-col card-shadow" style={{background: '#FFF', borderRadius: 16, width: '90vw', maxWidth: 450, padding: 32, display: 'flex', flexDirection: 'column'}}>
                <div className="flex justify-between items-center mb-4">
                  <span style={{fontWeight: 700, fontSize: 18}}>Assign Patient to Bed {assigningBed.id}</span>
                  <span onClick={() => setAssigningBed(null)} style={{cursor: 'pointer', fontSize: 18, color: COLORS.secondary}}>✕</span>
                </div>
                
                <input className="input-focus w-full" type="text" placeholder="Search patients..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px', marginBottom: 16, width: '100%'}} />
                
                <div style={{maxHeight: 250, overflowY: 'auto', border: '1px solid #E2E8F0', borderRadius: 8, padding: 8}}>
                  {filteredPatients.length === 0 ? (
                    <div style={{fontSize: 13, color: COLORS.muted, padding: '16px 0', textAlign: 'center'}}>No unassigned patients found</div>
                  ) : (
                    filteredPatients.map(p => (
                      <div key={p.id} className="flex justify-between items-center" style={{padding: '10px 8px', borderBottom: '1px solid #F1F5F9', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                        <div className="flex-col">
                          <span style={{fontWeight: 600, fontSize: 13}}>{p.name} ({p.id})</span>
                          <span style={{fontSize: 11, color: COLORS.secondary}}>{p.diagnosis}</span>
                        </div>
                        <button onClick={() => handleAssignPatient(p.id)} style={{background: COLORS.teal, border: 'none', color: COLORS.primary, padding: '6px 12px', borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600}}>Select</button>
                      </div>

    };

    // 3. MY PATIENTS TAB
    const MyPatientsTab = ({ doctor, onPatientClick, patients, triggerSave }) => {
      const myPatients = patients.filter(p => p.attendingDoctor === doctor.id);
      const referred = patients.filter(p => p.consultedDoctors.includes(doctor.id));
      const [referringPatient, setReferringPatient] = useState(null);

      const specialists = useMemo(() => {
        return USERS.filter(u => u.role === 'DOCTOR' && u.id !== doctor.id);
      }, [doctor]);

      const handleUpdatePlan = async (p) => {
        const note = prompt('Update Patient Plan:', p.notes || '');
        if (note !== null) {
          try {
            await api.request('/api/nexus/patients/update-plan', {
              method: 'POST',
              body: JSON.stringify({ patient_id: p.id, notes: note })
            });
            await triggerSave(null, null, null, `Updated Plan for ${p.id}: ${note}`);
          } catch (e) {
            alert(e.message);
          }
        }
      };

      const handleConfirmReferral = async (specialistId) => {
        if (!referringPatient) return;
        const targetSpec = USERS.find(u => u.id === specialistId);
        if (!targetSpec) return;
        try {
          await api.request('/api/nexus/patients/refer', {
            method: 'POST',
            body: JSON.stringify({ patient_id: referringPatient.id, specialist_id: specialistId })
          });
          await triggerSave(null, null, null, `Patient Referral: Referred ${referringPatient.id} to Dr. ${targetSpec.name}`);
        } catch (e) {
          alert(e.message);
        }
        setReferringPatient(null);
      };

      const handleImportJSON = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const parsed = JSON.parse(evt.target.result);
            const res = await api.request('/api/nexus/patients/import-json', {
              method: 'POST',
              body: JSON.stringify(parsed)
            });
            alert(res.detail || 'Patient record imported successfully!');
            await triggerSave(null, null, null, `Imported/Merged patient record: ${parsed.name || parsed.id}`);
          } catch(err) {
            alert('Import failed: ' + err.message);
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="flex-col gap-6">
          <div className="flex justify-between items-center">
            <div>
              <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>My Patients</div>
              <div style={{fontSize: 13, color: COLORS.secondary}}>Dr. {doctor.name} · {doctor.specialty}</div>
            </div>
            <div>
              <label 
                style={{
                  background: COLORS.teal, 
                  color: COLORS.primary, 
                  padding: '8px 16px', 
                  borderRadius: 6, 
                  cursor: 'pointer', 
                  fontWeight: 600,
                  fontSize: 13,
                  display: 'inline-block'
                }}
              >
                Import Patient JSON
                <input 
                  type="file" 
                  accept=".json" 
                  onChange={handleImportJSON} 
                  style={{display: 'none'}} 
                />
              </label>
            </div>
          </div>

          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16}}>
            {myPatients.map(p => <MyPatientCard key={p.id} p={p} onClick={() => onPatientClick(p)} isPrimary handleUpdatePlan={handleUpdatePlan} handleReferPatient={setReferringPatient} />)}
            {referred.map(p => <MyPatientCard key={p.id} p={p} onClick={() => onPatientClick(p)} handleUpdatePlan={handleUpdatePlan} handleReferPatient={setReferringPatient} />)}
          </div>

          {referringPatient && (
            <div className="flex items-center justify-center w-full h-full" style={{position: 'fixed', top: 0, left: 0, zIndex: 1000, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
              <div className="flex-col card-shadow" style={{background: '#FFF', borderRadius: 16, width: '90vw', maxWidth: 450, padding: 32, display: 'flex', flexDirection: 'column'}}>
                <div className="flex justify-between items-center mb-4">
                  <span style={{fontWeight: 700, fontSize: 18}}>Refer Patient {referringPatient.id}</span>
                  <span onClick={() => setReferringPatient(null)} style={{cursor: 'pointer', fontSize: 18, color: COLORS.secondary}}>✕</span>
                </div>
                
                <div style={{maxHeight: 250, overflowY: 'auto', border: '1px solid #E2E8F0', borderRadius: 8, padding: 8}}>
                  {specialists.map(s => (
                    <div key={s.id} className="flex justify-between items-center" style={{padding: '10px 8px', borderBottom: '1px solid #F1F5F9', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                      <div className="flex-col">
                        <span style={{fontWeight: 600, fontSize: 13}}>Dr. {s.name}</span>
                        <span style={{fontSize: 11, color: COLORS.secondary}}>{s.specialty}</span>
                      </div>
                      <button onClick={() => handleConfirmReferral(s.id)} style={{background: COLORS.teal, border: 'none', color: COLORS.primary, padding: '6px 12px', borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600}}>Refer</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const MyPatientCard = ({ p, onClick, isPrimary, handleUpdatePlan, handleReferPatient }) => (
      <div className="card-shadow flex-col" style={{background: '#FFF', border: '1px solid #E2E8F0', borderLeft: `4px solid ${p.status==='CRITICAL' ? COLORS.critical : COLORS.available}`, borderRadius: 12, padding: 24}}>
        <div className="flex justify-between items-center mb-3">
          <div className="flex gap-3 items-center">
            <span className="mono" style={{fontWeight: 500, fontSize: 16, color: COLORS.primary}}>{p.id}</span>
            <span style={{background: p.status==='CRITICAL' ? COLORS.critBg : COLORS.warnBg, color: p.status==='CRITICAL' ? COLORS.critical : COLORS.warning, fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 4}}>{p.status}</span>
          </div>
          <span className="mono" style={{fontSize: 11, background: '#F1F5F9', padding: '3px 8px', borderRadius: 5}}>BED {p.bedId}</span>
        </div>
        <div style={{fontWeight: 600, fontSize: 15, color: COLORS.primary}}>{p.name}</div>
        <div style={{fontWeight: 500, fontSize: 14, color: COLORS.primary, marginTop: 4}}>{p.diagnosis}</div>
        
        {p.notes && (
          <div style={{fontSize: 12, background: '#FFFBEB', padding: '8px 12px', borderRadius: 6, color: COLORS.warning, border: '1px solid #FDE68A', margin: '12px 0'}}>
            <span style={{fontWeight: 600}}>Plan:</span> {p.notes}
          </div>

        <div className="flex gap-2 mt-auto pt-4" style={{borderTop: '1px solid #E2E8F0'}}>
          <button onClick={onClick} style={{flex: 1, height: 36, background: COLORS.sidebar, color: '#FFF', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500}}>Full Report →</button>
          <button onClick={() => handleUpdatePlan(p)} style={{flex: 1, height: 36, background: '#FFF', border: '1px solid #E2E8F0', color: COLORS.primary, borderRadius: 6, cursor: 'pointer', fontSize: 13, fontWeight: 500}}>Plan</button>
          <button onClick={() => handleReferPatient(p)} style={{flex: 1, height: 36, background: '#FFF', border: '1px solid #E2E8F0', color: COLORS.primary, borderRadius: 6, cursor: 'pointer', fontSize: 13, fontWeight: 500}}>Refer</button>
        </div>
      </div>
    );

    // 4. EMERGENCY CASES TAB
    const EmergencyCasesTab = ({ doctor, patients, beds, triggerSave, ventilators }) => {
      const [allocatingPatient, setAllocatingPatient] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [severityFilter, setSeverityFilter] = useState('ALL');
      const [allocationFilter, setAllocationFilter] = useState('ALL');
      const [sortField, setSortField] = useState('id');
      const [sortOrder, setSortOrder] = useState('asc');

      const availableBedsForTriage = useMemo(() => {
        return beds.filter(b => b.status === 'AVAILABLE' && (b.zone === 'ICU' || b.zone === 'GA' || b.zone === 'GB'));
      }, [beds]);

      const handleConfirmAllocation = async (bedId) => {
        if (!allocatingPatient) return;
        try {
          await api.request('/api/nexus/beds/assign', {
            method: 'POST',
            body: JSON.stringify({ bed_id: bedId, patient_id: allocatingPatient.id })
          });
          await triggerSave(null, null, null, `Emergency Bed Triage: Reallocated Patient ${allocatingPatient.name || allocatingPatient.id} to ${bedId}`);
        } catch (e) {
          alert(e.message);
        }
        setAllocatingPatient(null);
      };

      const processedCases = useMemo(() => {
        let list = [...patients];

        // Search query filter
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(p => 
            p.id.toLowerCase().includes(q) || 
            (p.name && p.name.toLowerCase().includes(q)) || 
            (p.diagnosis && p.diagnosis.toLowerCase().includes(q))
          );
        }

        // Triage severity filter
        if (severityFilter !== 'ALL') {
          list = list.filter(p => {
            const isCritical = p.status === 'CRITICAL' || p.triage_level === 1;
            const isHigh = p.triage_level === 2;
            const isModerate = p.status === 'MODERATE' || p.triage_level === 3;
            const isStable = p.status === 'STABLE' || p.triage_level >= 4;
            
            if (severityFilter === 'CRITICAL') return isCritical;
            if (severityFilter === 'HIGH') return isHigh;
            if (severityFilter === 'MODERATE') return isModerate;
            if (severityFilter === 'STABLE') return isStable;
            return true;
          });
        }

        // Allocation status filter
        if (allocationFilter !== 'ALL') {
          list = list.filter(p => {
            const hasBed = !!p.bedId && p.bedId !== 'N/A' && !p.bedId.startsWith('EM');
            if (allocationFilter === 'ALLOCATED') return hasBed;
            if (allocationFilter === 'PENDING') return !hasBed;
            return true;
          });
        }

        // Sorting
        list.sort((a, b) => {
          let fieldA = a[sortField] || '';
          let fieldB = b[sortField] || '';

          if (sortField === 'wait_time') {
            fieldA = new Date(a.admission_time || 0).getTime();
            fieldB = new Date(b.admission_time || 0).getTime();
          }

          if (typeof fieldA === 'string') {
            return sortOrder === 'asc' 
              ? fieldA.localeCompare(fieldB) 
              : fieldB.localeCompare(fieldA);
          } else {
            return sortOrder === 'asc' 
              ? (fieldA > fieldB ? 1 : -1) 
              : (fieldB > fieldA ? 1 : -1);
          }
        });

        return list;
      }, [patients, searchQuery, severityFilter, allocationFilter, sortField, sortOrder]);

      return (
        <div className="flex-col gap-6">
          <div className="flex justify-between items-center">
            <div>
              <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Active Emergency Cases</div>
              <div style={{fontSize: 13, color: COLORS.secondary}}>Unallocated critical emergencies aligned with {doctor.specialty}</div>
            </div>
          </div>

          {/* Search, Filter, and Sorting Controls */}
          <div className="card-shadow" style={{background: '#FFF', borderRadius: 8, padding: 16, display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap', border: '1px solid #E2E8F0', marginTop: 12}}>
            <div style={{position: 'relative', flex: 1, minWidth: 200}}>
              <input 
                type="text" 
                placeholder="Search patient ID, name, or diagnosis..." 
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                style={{width: '100%', height: 38, paddingLeft: 12, paddingRight: 12, border: '1px solid #CBD5E1', borderRadius: 6, fontSize: 13}}
              />
            </div>
            
            <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
              <span style={{fontSize: 12, fontWeight: 600, color: COLORS.secondary}}>Severity:</span>
              <select 
                value={severityFilter} 
                onChange={e => setSeverityFilter(e.target.value)}
                style={{height: 38, border: '1px solid #CBD5E1', borderRadius: 6, fontSize: 13, padding: '0 8px', background: '#FFF'}}
              >
                <option value="ALL">All Severities</option>
                <option value="CRITICAL">🔴 Critical</option>

    // 5. CLINICAL RESOURCE OPTIMIZATION ENGINE TAB (BYOK INTEGRATED)
    const CROEngineTab = ({ config, triggerToast, patients, beds }) => {
      const [running, setRunning] = useState(false);
      const [messages, setMessages] = useState([]);
      const [targetPatient, setTargetPatient] = useState('P-024');

      const activePatientData = useMemo(() => {
        return patients.find(p => p.id === targetPatient) || patients[0];
      }, [patients, targetPatient]);

      const startSimulation = async () => {
        setRunning(true);
        setMessages([]);

        if (!config || config.provider === 'MOCK' || !config.apiKey) {
          // Play fallback mock negotiation logs sequential simulation
          let idx = 0;
          const interval = setInterval(() => {
            if (idx < DEMO_AGENT_MESSAGES.length) {
              setMessages(prev => [...prev, DEMO_AGENT_MESSAGES[idx]]);
              idx++;
            } else {
              clearInterval(interval);
              setRunning(false);
            }
          }, 1500);
          return;
        }

        // Active BYOK Pipeline Logic
        try {
          setMessages([{
            agent: 'System Orchestrator', role: 'Pipeline', color: '#7C3AED',
            text: `Contacting ${config.provider} API on custom model channel: ${config.model || 'default'}...`
          }]);

          const payloadPrompt = `
            You are simulating a hospital multi-agent clinical resource team. 
            Analyze this patient case data:
            Patient ID: ${activePatientData.id}
            Diagnosis: ${activePatientData.diagnosis}
            Vitals: ${JSON.stringify(activePatientData.vitals)}
            Tests: ${JSON.stringify(activePatientData.tests.slice(0, 3))}

            Provide a step-by-step negotiation script between 3 AI agents in raw JSON format.
            The final array must strictly match this shape:
            [
              {"agent": "Orchestrator", "role": "System Orchestrator", "color": "#7C3AED", "text": "agent narrative step"},
              {"agent": "ICU Agent", "role": "ICU Ward Coordinator", "color": "#2563EB", "text": "agent narrative step"},
              {"agent": "Staff Agent", "role": "Clinical Personnel Matcher", "color": "#D97706", "text": "agent recommendation"}
            ]
            Return only valid, parsable JSON. No markdown backticks.
          `;

          let res;
          if (config.provider === 'OPENAI') {
            const ep = config.endpoint || 'https://api.openai.com/v1/chat/completions';
            res = await fetch(ep, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${config.apiKey}`
              },
              body: JSON.stringify({
                model: config.model || 'gpt-4o-mini',
                messages: [{ role: 'user', content: payloadPrompt }]
              })
            });
          } else if (config.provider === 'ANTHROPIC') {
            const ep = config.endpoint || 'https://api.anthropic.com/v1/messages';
            res = await fetch(ep, {
              method: 'POST',
              headers: {
                'x-api-key': config.apiKey,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: config.model || 'claude-3-5-sonnet-20241022',
                max_tokens: 1000,
                messages: [{ role: 'user', content: payloadPrompt }]
              })
            });
          }

          if (!res || !res.ok) {
            throw new Error(`API status return code: ${res ? res.status : 'Fetch Blocked'}`);
          }

          const rawData = await res.json();
          let generatedContent = '';
          if (config.provider === 'OPENAI') {
            generatedContent = rawData.choices[0].message.content;
          } else {
            generatedContent = rawData.content[0].text;
          }

          // Strip markdown blocks if present
          const sanitized = generatedContent.replace(/```json|```/g, '').trim();
          const parsed = JSON.parse(sanitized);
          setMessages(parsed);
        } catch (err) {
          triggerToast('BYOK Execution failed, reverting to sandbox mode.');
          setMessages(prev => [...prev, {
            agent: 'Orchestrator', role: 'Fallback Engine', color: COLORS.critical,
            text: `BYOK Agent Error: ${err.message}. Initiating static safe fallback sequence...`
          }]);
          // append mock simulation steps
          setTimeout(() => {
            setMessages(DEMO_AGENT_MESSAGES);
          }, 1000);
        } finally {
          setRunning(false);
        }
      };

      return (
        <div className="flex-col gap-6">
          <div className="flex justify-between items-center">
            <div>
              <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Clinical Resource Optimization Engine (CRO Engine)</div>
              <div style={{fontSize: 13, color: COLORS.secondary}}>
                Currently using {config.provider === 'MOCK' ? 'CRO Engine Simulation sandbox' : `active ${config.provider} BYOK API`}
              </div>
            </div>
            <div className="flex gap-2">
              <select value={targetPatient} onChange={e => setTargetPatient(e.target.value)} disabled={running} style={{padding: '0 12px', borderRadius: 6, border: '1px solid #CBD5E1', outline: 'none'}}>
                {patients.map(p => (
                  <option key={p.id} value={p.id}>{p.id} - {p.name}</option>
                ))}
              </select>
              <button onClick={startSimulation} disabled={running} style={{background: COLORS.primary, color: '#FFF', border: 'none', padding: '10px 18px', borderRadius: 6, cursor: 'pointer'}}>
                {running ? 'Optimizing...' : 'Optimize Resource Placement'}
              </button>
            </div>
          </div>

          <div className="flex gap-6" style={{marginTop: 20}}>

              <span style={{fontWeight: 'bold', fontSize: 14, color: COLORS.primary, display: 'block', marginBottom: 16}}>Active Multi-Agent Script</span>
              <div className="flex-col gap-4">
                {messages.length === 0 ? (
                  <div style={{color: COLORS.muted, textAlign: 'center', padding: '48px 0', fontSize: 13}}>Awaiting negotiation initiation sequence.</div>
                ) : (
                  messages.map((m, idx) => (
                    <div key={idx} style={{borderLeft: `4px solid ${m.color || '#CBD5E1'}`, paddingLeft: 12, margin: '12px 0'}} className="flex-col">
                      <div className="flex items-center gap-2">

                        <span style={{fontSize: 11, color: COLORS.secondary}}>[{m.role}]</span>
                      </div>
                      <div style={{fontSize: 13, color: COLORS.primary, marginTop: 4}}>{m.text}</div>

        // 7. AMBULANCE DISPATCH TAB

    const SQLConsoleTab = ({ patients, beds, ventilators, triggerSave }) => {
      const [query, setQuery] = useState("SELECT id, name, diagnosis, status FROM patients WHERE status = 'CRITICAL'");
      const [headers, setHeaders] = useState([]);
      const [rows, setRows] = useState([]);
      const [error, setError] = useState('');
      const [activeSchema, setActiveSchema] = useState('patients');

      // Simple JSON SQL engine interpreter
      const executeLocalQuery = () => {
        setError('');
        try {
          const cleanQuery = query.replace(/\s+/g, ' ').replace(/;/g, '').trim();
          const selectRegex = /^SELECT\s+(.+?)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+?))?(?:\s+ORDER\s+BY\s+(.+?))?$/i;
          const updateRegex = /^UPDATE\s+(\w+)\s+SET\s+(.+?)\s+WHERE\s+(.+?)$/i;

          if (selectRegex.test(cleanQuery)) {
            const [, columnsRaw, tableName, whereRaw, orderRaw] = cleanQuery.match(selectRegex);
            let targetDataset = [];
            if (tableName.toLowerCase() === 'patients') targetDataset = patients;
            else if (tableName.toLowerCase() === 'beds') targetDataset = beds;
            else if (tableName.toLowerCase() === 'ventilators') targetDataset = Object.entries(ventilators).map(([id, item]) => ({ id, ...item }));
            else throw new Error(`Table "${tableName}" not found. Tables: patients, beds, ventilators.`);

            let filtered = [...targetDataset];

            // Evaluate simple WHERE filter
            if (whereRaw) {
              const eqMatch = whereRaw.match(/(\w+)\s*=\s*'(.+?)'/i);
              if (eqMatch) {
                const [, field, value] = eqMatch;
                filtered = filtered.filter(item => String(item[field] || '').toLowerCase() === value.toLowerCase());
              } else {
                throw new Error("WHERE parsing supports simple single conditions like: status = 'CRITICAL'");
              }
            }

            const cols = columnsRaw.split(',').map(c => c.trim());
            const displayHeaders = cols[0] === '*' ? Object.keys(targetDataset[0] || {}) : cols;

            const displayRows = filtered.map(item => {
              const row = {};
              displayHeaders.forEach(h => {
                row[h] = typeof item[h] === 'object' ? JSON.stringify(item[h]) : item[h];
              });
              return row;
            });

            setHeaders(displayHeaders);
            setRows(displayRows);
          } else if (updateRegex.test(cleanQuery)) {
            const [, tableName, setRaw, whereRaw] = cleanQuery.match(updateRegex);
            
            if (tableName.toLowerCase() !== 'patients') {
              throw new Error("This relational update emulator only allows updates on the 'patients' database.");
            }

            const setMatch = setRaw.match(/(\w+)\s*=\s*'(.+?)'/i);
            const whereMatch = whereRaw.match(/(\w+)\s*=\s*'(.+?)'/i);

            if (!setMatch || !whereMatch) {
              throw new Error("Please write a standardized statement. Example: UPDATE patients SET status = 'STABLE' WHERE id = 'P-024'");
            }

            const [, setField, setValue] = setMatch;
            const [, whereField, whereValue] = whereMatch;

            const updatedPatients = patients.map(p => {
              if (String(p[whereField] || '').toLowerCase() === whereValue.toLowerCase()) {
                return { ...p, [setField]: setValue };
              }
              return p;
            });

            triggerSave(updatedPatients, beds, ventilators, `SQL UPDATE: ${cleanQuery}`);
            setHeaders(['Status code']);
            setRows([[{ 'Status code': 'Database records modified successfully.' }]]);
          } else {
            throw new Error("Unsupported query statement. This relational sandbox supports simple SELECT or UPDATE queries.");
          }
        } catch (err) {
          setError(err.message);
        }
      };

      return (
        <div className="flex-col gap-6">
          <div className="flex justify-between items-center">
            <div>
              <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Relational Database Engine Console</div>

                <button onClick={executeLocalQuery} style={{background: COLORS.sidebar, color: '#FFF', border: 'none', padding: '8px 24px', borderRadius: 6, fontWeight: 600, cursor: 'pointer'}}>Execute Query</button>
              </div>

              {error && (
                <div style={{background: COLORS.critBg, border: `1px solid ${COLORS.critBorder}`, color: COLORS.critical, padding: 12, borderRadius: 6, fontSize: 13, fontFamily: 'DM Mono'}}>

              <div className="card-shadow" style={{background: '#FFF', borderRadius: 8, overflow: 'hidden', border: '1px solid #E2E8F0', marginTop: 16}}>
                <div style={{padding: '12px 16px', background: '#F8FAFC', fontWeight: 'bold', fontSize: 13, borderBottom: '1px solid #E2E8F0'}}>Query Results</div>
                <div style={{maxHeight: 250, overflowX: 'auto', overflowY: 'auto'}}>
                  <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left', fontSize: 12}}>
                    <thead style={{background: '#F1F5F9', color: COLORS.secondary}}>
                      <tr>
                        {headers.map(h => <th key={h} className="p-4 mono">{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.length === 0 ? (
                        <tr>
                          <td className="p-4" style={{textAlign: 'center', color: COLORS.muted}} colSpan={headers.length || 1}>No records returned.</td>
                        </tr>
                      ) : (

                </div>
              </div>
            </div>

              <span style={{fontWeight: 'bold', fontSize: 14, color: COLORS.primary}}>Database Schemas</span>

                {activeSchema === 'patients' && (

          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Clinical Vitals Registration</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Input patient telemetry statistics directly</div>
          </div>

          <div className="card-shadow" style={{background: '#FFF', border: '1px solid #E2E8F0', borderRadius: 12, padding: 24, maxWidth: 450, margin: '16px auto', display: 'flex', flexDirection: 'column'}}>
            <div className="flex-col gap-3">
              <label style={{fontSize: 12, fontWeight: 'bold'}}>SELECT PATIENT</label>
              <select value={selectedPatient} onChange={e=>setSelectedPatient(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}}>
                <option value="">-- Choose Patient --</option>
                {assignedPatients.map(p => (
                  <option key={p.id} value={p.id}>{p.name} ({p.id})</option>
                ))}
              </select>

              {selectedPatient && (
                <>
                  <label style={{fontSize: 12, fontWeight: 'bold', marginTop: 12}}>BLOOD PRESSURE</label>
                  <input className="input-focus" type="text" placeholder="120/80" value={bp} onChange={e=>setBp(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

                  <label style={{fontSize: 12, fontWeight: 'bold', marginTop: 12}}>SPO2 (%)</label>
                  <input className="input-focus" type="number" placeholder="98" value={spo2} onChange={e=>setSpo2(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

                  <label style={{fontSize: 12, fontWeight: 'bold', marginTop: 12}}>GCS</label>
                  <input className="input-focus" type="number" placeholder="15" value={gcs} onChange={e=>setGcs(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

                  <label style={{fontSize: 12, fontWeight: 'bold', marginTop: 12}}>HEART RATE</label>
                  <input className="input-focus" type="number" placeholder="78" value={hr} onChange={e=>setHr(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

                  <button onClick={handleSaveVitals} style={{background: COLORS.sidebar, color: '#FFF', border: 'none', padding: '12px', borderRadius: 6, cursor: 'pointer', fontWeight: 600, marginTop: 16}}>
                    Save Updated Vitals
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    };

    // 13. NURSE BEDS TAB
    const NurseBedsTab = ({ nurse, beds, patients }) => {
      const wardPrefix = useMemo(() => {
        if (nurse.ward === 'ICU Wing') return 'ICU';
        if (nurse.ward === 'Emergency Bay') return 'EM';
        if (nurse.ward === 'General Ward A') return 'GA';
        if (nurse.ward === 'General Ward B') return 'GB';
        return '';
      }, [nurse]);

      const filteredBeds = beds.filter(b => b.zone === wardPrefix);

      return (
        <div className="flex-col gap-4">
          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>My Ward Bed Statuses</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Live structural bed map details for {nurse.ward}</div>
          </div>

          <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 14, marginTop: 16}}>
            {filteredBeds.map(b => (
              <div key={b.id} style={{border: '1px solid #E2E8F0', padding: 16, borderRadius: 8, background: '#FFF'}} className="flex justify-between items-center">
                <div className="flex-col">
                  <span className="mono" style={{fontWeight: 'bold'}}>{b.id}</span>
                  <span style={{fontSize: 12, color: COLORS.secondary}}>Patient ID: {b.patientId || 'None'}</span>
                </div>
                <div style={{width: 12, height: 12, borderRadius: '50%', background: b.status === 'AVAILABLE' ? COLORS.available : b.status === 'CRITICAL' ? COLORS.critical : COLORS.warning}}></div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // 14. RECEPTIONIST PATIENT REGISTRATION TAB
    const RecepRegistrationTab = ({ patients, beds, triggerSave, ventilators }) => {
      const [name, setName] = useState('');
      const [age, setAge] = useState('');
      const [gender, setGender] = useState('M');
      const [blood, setBlood] = useState('O+');
      const [diagnosis, setDiagnosis] = useState('');
      const [bedId, setBedId] = useState('');

      const availableBeds = useMemo(() => {
        return beds.filter(b => b.status === 'AVAILABLE');
      }, [beds]);

      const handleRegister = async () => {
        if (!name || !age || !diagnosis || !bedId) {
          alert('Please fill all mandatory registration fields.');
          return;
        }
        try {
          await api.request('/api/nexus/patients/register', {
            method: 'POST',
            body: JSON.stringify({
              name,
              age: parseInt(age),
              gender,
              bloodGroup: blood,
              diagnosis,
              bedId
            })
          });
          await triggerSave(null, null, null, `Patient Intake: Admitted ${name} to Bed ${bedId}`);
          setName(''); setAge(''); setDiagnosis(''); setBedId('');
        } catch (e) {
          alert(e.message);
        }
      };

      return (
        <div className="flex-col gap-4">
          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Patient Registration Form</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Input details for incoming patient triage directly</div>
          </div>

          <div className="card-shadow" style={{background: '#FFF', border: '1px solid #E2E8F0', borderRadius: 12, padding: 24, maxWidth: 500, margin: '16px auto', display: 'flex', flexDirection: 'column'}}>
            <div className="flex-col gap-3">
              <label style={{fontSize: 11, fontWeight: 'bold'}}>PATIENT NAME *</label>
              <input className="input-focus" type="text" value={name} onChange={e=>setName(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

              <div className="flex gap-3">
                <div className="flex-col" style={{flex: 1}}>
                  <label style={{fontSize: 11, fontWeight: 'bold'}}>AGE *</label>
                  <input className="input-focus" type="number" value={age} onChange={e=>setAge(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px', width: '100%'}} />
                </div>
                <div className="flex-col" style={{flex: 1}}>
                  <label style={{fontSize: 11, fontWeight: 'bold'}}>GENDER</label>
                  <select value={gender} onChange={e=>setGender(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px', width: '100%'}}>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>

              <div className="flex gap-3">
                <div className="flex-col" style={{flex: 1}}>
                  <label style={{fontSize: 11, fontWeight: 'bold'}}>BLOOD GROUP</label>
                  <input className="input-focus" type="text" value={blood} onChange={e=>setBlood(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px', width: '100%'}} />
                </div>
                <div className="flex-col" style={{flex: 1}}>
                  <label style={{fontSize: 11, fontWeight: 'bold'}}>CHOOSE BED *</label>
                  <select value={bedId} onChange={e=>setBedId(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px', width: '100%'}}>
                    <option value="">-- Select Bed --</option>
                    {availableBeds.map(b => (
                      <option key={b.id} value={b.id}>{b.id} ({b.zone})</option>
                    ))}
                  </select>
                </div>
              </div>

              <label style={{fontSize: 11, fontWeight: 'bold'}}>DIAGNOSIS *</label>
              <input className="input-focus" type="text" value={diagnosis} onChange={e=>setDiagnosis(e.target.value)} style={{height: 40, border: '1px solid #CBD5E1', borderRadius: 6, padding: '0 12px'}} />

              <button onClick={handleRegister} style={{background: COLORS.sidebar, color: '#FFF', border: 'none', padding: '12px', borderRadius: 6, cursor: 'pointer', fontWeight: 600, marginTop: 16}}>
                Complete Registration
              </button>
            </div>
          </div>
        </div>
      );
    };

    // 15. RECEPTIONIST BED AVAILABILITY TAB
    const RecepBedsTab = ({ beds }) => {
      const zones = ['ICU', 'EM', 'GA', 'GB', 'OT'];
      return (
        <div className="flex-col gap-4">
          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Live Room Occupancy Metrics</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Live totals updated across structural departments</div>
          </div>

          <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 16, marginTop: 16}}>
            {zones.map(z => {
              const total = beds.filter(b => b.zone === z).length;
              const occupied = beds.filter(b => b.zone === z && b.status !== 'AVAILABLE').length;
              return (
                <div key={z} className="card-shadow flex-col" style={{background: '#FFF', padding: 24, borderRadius: 12, border: '1px solid #E2E8F0'}}>
                  <span style={{fontWeight: 'bold', color: COLORS.secondary, fontSize: 13}}>{z} WARD</span>
                  <div style={{fontSize: 28, fontWeight: 'bold', margin: '8px 0'}}>{total - occupied} / {total}</div>
                  <span style={{fontSize: 11, color: COLORS.muted}}>Available Beds</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // 16. RECEPTIONIST DISCHARGE TAB
    const RecepDischargeTab = ({ patients, beds, triggerSave, ventilators }) => {
      const stablePatients = patients.filter(p => p.status === 'STABLE');

      const handleDischarge = async (p) => {
        try {
          await api.request(`/api/nexus/patients/discharge/${p.id}`, {
            method: 'POST'
          });
          await triggerSave(null, null, null, `Patient Discharge: Discharged ${p.name} from Bed ${p.bedId}`);
        } catch (e) {
          alert(e.message);
        }
      };

      return (
        <div className="flex-col gap-4">
          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Discharge Protocol Window</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Execute patient discharge protocol details to free capacity</div>
          </div>

          <div style={{marginTop: 16, background: '#FFF', border: '1px solid #E2E8F0', borderRadius: 12, overflow: 'hidden'}}>
            <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left'}}>
              <thead style={{background: '#F8FAFC', fontSize: 11, color: COLORS.secondary}}>
                <tr>
                  <th className="p-4">PATIENT ID</th>
                  <th className="p-4">NAME</th>
                  <th className="p-4">DIAGNOSIS</th>
                  <th className="p-4">ASSIGNED BED</th>
                  <th className="p-4">ACTION</th>
                </tr>
              </thead>
              <tbody>
                {stablePatients.map(p => (
                  <tr key={p.id} style={{borderTop: '1px solid #E2E8F0'}}>
                    <td className="p-4 mono">{p.id}</td>
                    <td className="p-4">{p.name}</td>
                    <td className="p-4">{p.diagnosis}</td>
                    <td className="p-4 mono">{p.bedId}</td>
                    <td className="p-4">
                      <button onClick={() => handleDischarge(p)} style={{background: COLORS.available, color: '#FFF', border: 'none', padding: '6px 12px', borderRadius: 4, cursor: 'pointer', fontWeight: 600}}>Discharge</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // 17. AMBULANCE COMMAND TAB
    const AmbulanceCommandTab = ({ patients, beds, lastAlert }) => {
      const totalOccupiedCount = beds.filter(b=>b.status!=='AVAILABLE').length;
      const occupancyPercent = Math.round((totalOccupiedCount / beds.length) * 100);

      return (
        <div className="flex-col gap-6">
          <div>
            <div style={{fontSize: 18, fontWeight: 600, color: COLORS.primary}}>Ambulance Paramedic Command</div>
            <div style={{fontSize: 13, color: COLORS.secondary}}>Hospital Capacity Diagnostics Screen</div>
          </div>

          <div className="card-shadow" style={{background: '#FFF', border: '1px solid #E2E8F0', borderRadius: 12, padding: 24}}>
            <div style={{fontSize: 14, fontWeight: 600, marginBottom: 8}}>Live NEXUS Bed Occupancy</div>
            <div className="mono" style={{fontSize: 24, fontWeight: 'bold'}}>{occupancyPercent}% Occupied</div>

            {occupancyPercent >= 80 ? (
              <div style={{background: COLORS.critBg, border: `1px solid ${COLORS.critBorder}`, color: COLORS.critical, padding: 16, borderRadius: 8, marginTop: 16}}>
                <strong>⚠ HOSPITAL DIVERT PROTOCOL ACTIVE</strong> — Divert paramedics to alternate branch: <strong>{lastAlert ? lastAlert.hospital : 'NEXUS Metro South Branch'}</strong>
              </div>
            ) : (
              <div style={{background: COLORS.availBg, border: `1px solid ${COLORS.availBorder}`, color: COLORS.available, padding: 16, borderRadius: 8, marginTop: 16}}>
                ✓ Hospital capacity stable. Proceed with walk-in triage routing as needed.
              </div>
            )}
          </div>
        </div>
      );
    };

    const VitalCell = ({ label, val, color }) => (
      <div style={{background: '#FFF', borderRadius: 6, padding: '8px', borderLeft: `3px solid ${color}`, textAlign: 'center', flex: 1}}>
        <div style={{fontSize: 9, color: COLORS.muted, marginBottom: 2}}>{label}</div>
        <div className="mono" style={{fontSize: 16, fontWeight: 500, color}}>{val}</div>
      </div>
    );

    // --- CLINICAL REPORT MODAL ---
    const ClinicalReportModal = ({ patient: p, onClose, patients }) => {
      const doc = USERS.find(d => d.id === p.attendingDoctor);
      return (
        <div className="flex items-center justify-center w-full h-full" style={{position: 'fixed', top: 0, left: 0, zIndex: 1000, background: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center'}}>
          <div className="flex-col relative card-shadow text-black" style={{background: '#FFF', borderRadius: 16, width: '90vw', maxWidth: 1000, maxHeight: '90vh', overflowY: 'auto', padding: 40, display: 'flex', flexDirection: 'column'}}>
            <div style={{position: 'absolute', top: 24, right: 24, cursor: 'pointer'}} onClick={onClose}>✕</div>
            
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
              <div style={{fontWeight: 700, fontSize: 22, color: COLORS.primary}}>Patient Clinical File</div>
              <div style={{display: 'flex', gap: 10, marginRight: 40}}>
                <button 
                  onClick={() => window.open(`/api/nexus/patients/${p.id}/pdf-report`, '_blank')} 
                  style={{
                    background: COLORS.teal, 
                    color: COLORS.primary, 
                    border: 'none', 
                    padding: '8px 16px', 
                    borderRadius: 6, 
                    cursor: 'pointer', 
                    fontWeight: 600
                  }}
                >
                  Download PDF
                </button>
                <button 
                  onClick={() => window.open(`/api/nexus/patients/${p.id}/csv-report`, '_blank')} 
                  style={{
                    background: COLORS.sidebar, 
                    color: '#FFF', 
                    border: 'none', 
                    padding: '8px 16px', 
                    borderRadius: 6, 
                    cursor: 'pointer', 
                    fontWeight: 600
                  }}
                >
                  Download CSV
                </button>
                <button 
                  onClick={async () => {
                    try {
                      const data = await api.request(`/api/nexus/patients/${p.id}/export-json`);
                      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                      const url = URL.createObjectURL(blob);
                      const a = document.createElement('a');
                      a.href = url;
                      a.download = `Patient_${p.id}_Record.json`;
                      a.click();
                      URL.revokeObjectURL(url);
                    } catch(err) {
                      alert('Export failed: ' + err.message);
                    }
                  }} 
                  style={{
                    background: '#FFF', 
                    color: COLORS.primary, 
                    border: '1px solid #CBD5E1', 
                    padding: '8px 16px', 
                    borderRadius: 6, 
                    cursor: 'pointer', 
                    fontWeight: 600
                  }}
                >
                  Export JSON
                </button>
              </div>
            </div>
            
            <div className="flex items-center gap-4 mt-2">
              <span className="mono" style={{fontWeight: 500, fontSize: 16, color: COLORS.secondary}}>{p.id} — {p.diagnosis}</span>
              <span style={{background: p.status==='CRITICAL'?COLORS.critical:COLORS.warning, color: '#FFF', fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 4}}>{p.status}</span>
              <span style={{fontSize: 13, color: COLORS.muted}}>Attending: {doc ? 'Dr. ' + doc.name : 'Unknown'}</span>
            </div>

            <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginTop: 32}}>
              {[{l:'Name', v:p.name}, {l:'Age', v:p.age}, {l:'Gender', v:p.gender}, {l:'Blood Group', v:p.bloodGroup}].map(d => (
                <div key={d.l}>
                  <div style={{fontSize: 10, color: COLORS.muted, marginBottom: 4}}>{d.l.toUpperCase()}</div>
                  <div style={{fontWeight: 500, fontSize: 14, color: COLORS.primary}}>{d.v}</div>
                </div>
              ))}
            </div>

            <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginTop: 32}}>
              <VitalCell label="BP" val={p.vitals.bp} color={COLORS.available} />
              <VitalCell label="SPO2" val={`${p.vitals.spo2}%`} color={p.vitals.spo2<92?COLORS.critical:COLORS.available} />
              <VitalCell label="GCS" val={p.vitals.gcs} color={p.vitals.gcs<13?COLORS.critical:COLORS.available} />
              <VitalCell label="HR" val={p.vitals.hr} color={COLORS.available} />
            </div>

            <div style={{marginTop: 32}}>
              <div style={{fontWeight: 600, fontSize: 14, color: COLORS.primary, marginBottom: 12}}>Investigations & Test Results</div>
              <table style={{width: '100%', borderCollapse: 'collapse', textAlign: 'left', border: '1px solid #E2E8F0', borderRadius: 12, overflow: 'hidden'}}>
                <thead style={{background: '#F8FAFC', fontSize: 11, color: COLORS.secondary}}>
                  <tr>
                    <th className="p-4">TEST NAME</th>
                    <th className="p-4">RESULT</th>
                    <th className="p-4">STATUS</th>
                  </tr>
                </thead>
                <tbody>
                  {p.tests.map((t,i) => (
                    <tr key={i} style={{borderTop: '1px solid #E2E8F0'}}>
                      <td className="p-4">{t.name}</td>
                      <td className="p-4 mono">{t.result}</td>
                      <td className="p-4">
                        <span style={{background: t.status==='ABNORMAL'?COLORS.critical:COLORS.available, color: '#FFF', padding: '2px 6px', borderRadius: 4, fontSize: 10, fontWeight: 600}}>{t.status}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    // --- MAIN APP FRAMEWORK RENDER ---
    const App = () => {
      const [screen, setScreen] = useState('INTRO');
      const [user, setUser] = useState(null);

      useEffect(() => {
        const checkAuth = async () => {
          let token = localStorage.getItem('token');
          if (token) {
            api.setToken(token);
            try {
              const u = await api.request('/api/auth/me');
              setUser(u);
              setScreen('DASHBOARD');
            } catch (e) {
              localStorage.removeItem('token');
              api.setToken(null);
            }
          }
        };
        checkAuth();
        
        const handleUnauthorized = () => {
          localStorage.removeItem('token');
          api.setToken(null);
          setUser(null);
          setScreen('LOGIN');
        };
        window.addEventListener('unauthorized', handleUnauthorized);
        return () => window.removeEventListener('unauthorized', handleUnauthorized);
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('token');
        api.setToken(null);
        setUser(null);
        setScreen('LOGIN');
      };

      return (
        <div style={{width: '100vw', height: '100vh', overflow: 'hidden'}}>
          {screen === 'INTRO' && (
            <IntroScreen onComplete={() => {
              if (user) {
                setScreen('DASHBOARD');
              } else {
                setScreen('LOGIN');
              }
            }} />
          )}
          {screen === 'LOGIN' && (
            <LoginScreen onSuccess={(u) => { setUser(u); setScreen('WELCOME'); }} />
          )}
          {screen === 'WELCOME' && (
            <WelcomeScreen user={user} onComplete={() => setScreen('DASHBOARD')} />
          )}
          {screen === 'DASHBOARD' && (
            <Dashboard user={user} onLogout={handleLogout} />
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
