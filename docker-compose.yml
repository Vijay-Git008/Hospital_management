version: '3.8'

services:
  backend:
    build: ./backend
    container_name: emergency-negotiation-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CURRENT_TIME=2026-07-16T13:40:00
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: emergency-negotiation-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
